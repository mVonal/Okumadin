name: ToS Değişiklik Takibi

on:
  schedule:
    - cron: '0 9 * * 1'  # Her Pazartesi 09:00 UTC
  workflow_dispatch:      # Manuel tetikleme butonu

permissions:
  contents: write
  issues: write

jobs:
  tos-check:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4

      - name: ToS takip scriptini çalıştır
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python araclar/tos-tracker.py

      - name: Hash dosyasını kaydet
        uses: actions/commit-files@v1
        continue-on-error: true
        with:
          commit-message: "chore: ToS hash güncellendi"
          file-pattern: "araclar/hashes.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Değişiklikleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add araclar/hashes.json
          git diff --staged --quiet || git commit -m "chore: ToS hash güncellendi [skip ci]"
          git push
